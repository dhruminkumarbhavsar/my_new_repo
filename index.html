<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Project</title>

    <!-- CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
            text-align: center;
            color: #333;
        }

        header {
            background: #ffffff;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        h1 {
            margin: 0;
        }

        .container {
            margin-top: 50px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #4facfe;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }
    </style>
</head>

<body>

    <header>
        <h1>Welcome to My Project 🚀</h1>
    </header>

    <div class="container">
        <div class="card">
            <h2>Get Started</h2>
            <p>Click below to test your application</p>
            <button onclick="showMessage()">Click Me</button>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        function showMessage() {
            alert("Frontend is working! 🎉");
        }
    </script>

</body>
</html>
